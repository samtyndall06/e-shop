<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eshop - My Orders</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
    </div>
    <!-- Hamburger button — only visible on mobile -->
    <button type="button" class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<!-- Mobile dropdown menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/cart">Cart</a>
    <a href="/orders">Orders</a>
    <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
    <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
</div>

<main class="main">
    <h1 class="page-title">My Orders</h1>

    <!-- No orders yet -->
    <div class="empty" th:if="${#lists.isEmpty(orders)}">
        <p>You haven't placed any orders yet.</p>
        <a href="/" class="btn-browse">Start Shopping</a>
    </div>

    <!-- Orders list -->
    <div class="orders-list" th:unless="${#lists.isEmpty(orders)}">
        <div class="order-card" th:each="order : ${orders}">
            <div class="order-header">
                <div>
                    <span class="order-id" th:text="'Order #' + ${order.id}"></span>
                    <span class="order-date"
                          th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}">
                    </span>
                </div>
                <div>
                    <span class="order-status" th:text="${order.status}"></span>
                    <span class="order-total"
                          th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}">
                    </span>
                </div>
            </div>

            <!-- Order items -->
            <div class="order-items">
                <div class="order-item" th:each="item : ${order.orderItems}">
                    <span th:text="${item.product.name}"></span>
                    <span th:text="'x' + ${item.quantity}"></span>
                    <span th:text="'$' + ${#numbers.formatDecimal(item.price, 1, 2)}"></span>
                </div>
            </div>

            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn-view-order">View Details</a>
        </div>
    </div>
</main>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });
    // Close menu when a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        });
    });
</script>
</body>
</html>
