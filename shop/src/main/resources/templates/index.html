<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eshop - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
    </div>
</nav>

<!-- SEARCH & FILTER TOOLBAR -->
<div class="toolbar">
    <form method="get" action="/" style="display:flex; gap: 8px;">
        <input
            type="text"
            name="search"
            placeholder="Search products..."
            th:value="${search}"
        />
        <button type="submit">Search</button>
    </form>
    <div class="category-filters">
        <a href="/" th:classappend="${selectedCategory == null} ? 'active'">All</a>

            <a th:each="category : ${categories}"
            th:href="@{/(categoryId=${category.id})}"
            th:text="${category.name}"
            th:classappend="${selectedCategory == category.id} ? 'active'"
        ></a>
    </div>
</div>

<!-- MAIN CONTENT -->
<main class="main">

    <div class="empty" th:if="${#lists.isEmpty(products)}">
        <p>No products found.</p>
    </div>

    <div class="product-grid" th:unless="${#lists.isEmpty(products)}">
        <div class="product-card" th:each="product : ${products}">

            <a th:href="@{/product/{id}(id=${product.id})}">
                <img
                    th:if="${product.imageUrl != null}"
                    th:src="${product.imageUrl}"
                    th:alt="${product.name}"
                />
                <div class="product-img-placeholder" th:unless="${product.imageUrl != null}">
                    No image
                </div>
            </a>

            <div class="product-info">
                <div class="product-category"
                     th:text="${product.category != null ? product.category.name : ''}">
                </div>
                <div class="product-name" th:text="${product.name}"></div>
                <div class="product-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>

                <form method="post" action="/cart/add">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="productId" th:value="${product.id}"/>
                    <input type="hidden" name="quantity" value="1"/>
                    <button class="btn-add" type="submit">Add to Cart</button>
                </form>
            </div>

        </div>
    </div>

</main>

</body>
</html>
