<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eshop - Order Confirmed</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
    </div>
    <!-- Hamburger button — only visible on mobile -->
    <button type="button" class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<!-- Mobile dropdown menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/cart">Cart</a>
    <a href="/orders">Orders</a>
    <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
    <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
</div>

<main class="main">
    <div class="confirmation-card">

        <!-- Success icon -->
        <div class="confirmation-icon">✓</div>

        <h1>Order Placed!</h1>
        <p class="confirmation-subtitle">
            Thank you for your order. Your order has been confirmed.
        </p>

        <!-- Order details -->
        <div class="confirmation-details" th:if="${order != null}">
            <div class="confirmation-row">
                <span>Order ID</span>
                <strong th:text="'#' + ${order.id}"></strong>
            </div>
            <div class="confirmation-row">
                <span>Status</span>
                <strong th:text="${order.status}"></strong>
            </div>
            <div class="confirmation-row">
                <span>Total</span>
                <strong th:text="'$' + ${#numbers.formatDecimal(order.total, 1, 2)}"></strong>
            </div>
            <div class="confirmation-row">
                <span>Date</span>
                <strong th:text="${#temporals.format(order.createdAt, 'dd MMM yyyy')}"></strong>
            </div>
        </div>

        <div class="confirmation-actions">
            <a href="/orders" class="btn-submit" style="text-decoration:none;">View My Orders</a>
            <a href="/" class="btn-continue">Continue Shopping</a>
        </div>

    </div>
</main>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });
    // Close menu when a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        });
    });
</script>
</body>
</html>
