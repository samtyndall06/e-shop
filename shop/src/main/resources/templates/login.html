<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eshop - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2>Login</h2>

        <!-- Error message e.g. wrong password -->
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <!-- Success message e.g. just registered -->
        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <!-- Login form — Spring Security handles POST /login automatically -->
        <form method="post" action="/login">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" placeholder="Enter your email" required/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required/>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
    </div>
</div>

</body>
</html>
