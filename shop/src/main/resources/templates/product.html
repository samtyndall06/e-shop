<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - Eshop'">Product - Eshop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
    </div>
    <!-- Hamburger button — only visible on mobile -->
    <button type="button" class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<!-- Mobile dropdown menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/cart">Cart</a>
    <a href="/orders">Orders</a>
    <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
    <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
</div>

<!-- PARALLAX HERO -->
<div class="product-hero" th:if="${product.imageUrl != null}">
    <div class="product-hero-bg" th:style="'background-image: url(' + ${product.imageUrl} + ')'"></div>
    <div class="product-hero-overlay"></div>
    <div class="product-hero-content">
        <div class="product-hero-category" th:text="${product.category != null ? product.category.name : ''}"></div>
        <h1 th:text="${product.name}"></h1>
        <div class="product-hero-price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}"></div>
    </div>
</div>

<main class="main">

    <!-- PRODUCT DETAIL -->
    <div class="product-detail">

        <!-- LEFT: Image -->
        <div class="product-detail-img">
            <img th:if="${product.imageUrl != null}"
                 th:src="${product.imageUrl}"
                 th:alt="${product.name}"
                 class="product-detail-image"/>
            <div class="product-img-placeholder" th:unless="${product.imageUrl != null}">
                No image
            </div>
        </div>

        <!-- RIGHT: Info -->
        <div class="product-detail-info">
            <div class="product-detail-category"
                 th:text="${product.category != null ? product.category.name : ''}">
            </div>
            <h1 th:text="${product.name}"></h1>
            <div class="product-detail-price"
                 th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">
            </div>
            <p class="product-detail-description" th:text="${product.description}"></p>

            <!-- Stock status -->
            <div class="stock-status">
                <span class="in-stock" th:if="${product.stock > 0}"
                      th:text="'✓ In stock (' + ${product.stock} + ' available)'">
                </span>
                <span class="out-of-stock" th:unless="${product.stock > 0}">
                    Out of stock
                </span>
            </div>

            <!-- Add to cart -->
            <form method="post" action="/cart/add" th:if="${product.stock > 0}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <div class="quantity-row">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity"
                           value="1" min="1" th:max="${product.stock}"/>
                </div>
                <button type="submit" class="btn-submit">Add to Cart</button>
            </form>

            <a href="/" class="btn-back">← Back to products</a>
        </div>
    </div>

    <!-- REVIEWS -->
    <div class="reviews-section">
        <div class="reviews-header">
            <h2>Customer Reviews</h2>
            <div class="average-rating-badge" th:if="${averageRating > 0}">
                <span th:text="${#numbers.formatDecimal(averageRating, 1, 1)}"></span>
                <span class="rating-label">out of 5</span>
            </div>
        </div>

        <div class="empty" th:if="${#lists.isEmpty(reviews)}">
            <p>No reviews yet — be the first!</p>
        </div>

        <div class="review-card" th:each="review : ${reviews}">
            <div class="review-header">
                <span class="review-author" th:text="${review.user.name}"></span>
                <span class="review-rating-stars"
                      th:text="${review.rating} + ' ★'"></span>
                <span class="review-date"
                      th:text="${#temporals.format(review.createdAt, 'dd MMM yyyy')}">
                </span>
            </div>
            <p class="review-comment" th:text="${review.comment}"></p>
        </div>

        <!-- Add review -->
        <div class="add-review" th:if="${#authorization.expression('isAuthenticated()')}">
            <h3>Leave a Review</h3>
            <form method="post" th:action="@{/product/{id}/review(id=${product.id})}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label for="rating">Rating (1-5)</label>
                    <input type="number" id="rating" name="rating" min="1" max="5" required/>
                </div>
                <div class="form-group">
                    <label for="comment">Comment</label>
                    <textarea id="comment" name="comment" rows="3"
                              placeholder="Share your thoughts..."></textarea>
                </div>
                <button type="submit" class="btn-submit" style="width:auto; padding: 12px 28px;">
                    Submit Review
                </button>
            </form>
        </div>
    </div>

</main>

<!-- PARALLAX SCROLL SCRIPT -->
<script>
    const heroBg = document.querySelector('.product-hero-bg');
    if (heroBg) {
        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;
            heroBg.style.transform = `translateY(${scrollY * 0.4}px)`;
        });
    }
</script>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });
    // Close menu when a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        });
    });
</script>
</body>
</html>
