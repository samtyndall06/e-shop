<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eshop - Checkout</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
        <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
    </div>
    <!-- Hamburger button — only visible on mobile -->
    <button type="button" class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<!-- Mobile dropdown menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="/">Home</a>
    <a href="/cart">Cart</a>
    <a href="/orders">Orders</a>
    <a th:if="${#authorization.expression('isAuthenticated()')}" href="/logout">Logout</a>
    <a th:unless="${#authorization.expression('isAuthenticated()')}" href="/login">Login</a>
</div>

<main class="main">
    <h1 class="page-title">Checkout</h1>

    <div class="checkout-container">

        <!-- LEFT: Order summary -->
        <div class="checkout-items">
            <h2>Order Summary</h2>

            <div class="cart-item" th:each="item : ${cartItems}">
                <div class="cart-item-img">
                    <img
                        th:if="${item.product.imageUrl != null}"
                        th:src="${item.product.imageUrl}"
                        th:alt="${item.product.name}"
                    />
                    <div class="product-img-placeholder" th:unless="${item.product.imageUrl != null}">
                        No image
                    </div>
                </div>
                <div class="cart-item-details">
                    <div class="cart-item-name" th:text="${item.product.name}"></div>
                    <div class="cart-item-price"
                         th:text="'$' + ${#numbers.formatDecimal(item.product.price, 1, 2)}">
                    </div>
                </div>
                <div class="cart-item-quantity">
                    <span>Qty: </span>
                    <strong th:text="${item.quantity}"></strong>
                </div>
                <div class="cart-item-subtotal"
                     th:text="'$' + ${#numbers.formatDecimal(item.product.price * item.quantity, 1, 2)}">
                </div>
            </div>

            <!-- Total -->
            <div class="checkout-total">
                <span>Total</span>
                <span th:text="'$' + ${#numbers.formatDecimal(cartTotal, 1, 2)}"></span>
            </div>
        </div>

        <!-- RIGHT: Payment & confirm -->
        <div class="checkout-form">
            <h2>Payment Details</h2>
            <p class="checkout-note">This is a demo store — no real payment is processed.</p>

            <!-- Fake card fields for UI purposes only -->
            <div class="form-group">
                <label>Cardholder Name</label>
                <input type="text" placeholder="John Smith"/>
            </div>
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="1234 5678 9012 3456" maxlength="19"/>
            </div>
            <div class="checkout-row">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="text" placeholder="MM/YY" maxlength="5"/>
                </div>
                <div class="form-group">
                    <label>CVV</label>
                    <input type="text" placeholder="123" maxlength="3"/>
                </div>
            </div>

            <h2 style="margin-top: 1.5rem;">Shipping Address</h2>
            <div class="form-group">
                <label>Street Address</label>
                <input type="text" placeholder="123 Main Street"/>
            </div>
            <div class="checkout-row">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" placeholder="Auckland"/>
                </div>
                <div class="form-group">
                    <label>Postcode</label>
                    <input type="text" placeholder="1010"/>
                </div>
            </div>

            <!-- Confirm order form — this is the real submit -->
            <form method="post" action="/checkout/confirm">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-submit" style="margin-top: 1.5rem;">
                    Place Order
                </button>
            </form>

            <a href="/cart" class="btn-continue">Back to Cart</a>
        </div>

    </div>
</main>
<script>
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('open');
        mobileMenu.classList.toggle('open');
    });
    // Close menu when a link is clicked
    mobileMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileMenu.classList.remove('open');
        });
    });
</script>
</body>
</html>
