<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Eshop - Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav>
    <div class="nav-logo">e<span>shop</span></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>

        <!-- Error message e.g. email already taken -->
        <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <form method="post" action="/register">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required/>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required/>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Choose a password" required/>
            </div>

            <div class="form-group">
                <label for="address">Address <span style="color:#999;">(optional)</span></label>
                <input type="text" id="address" name="address" placeholder="Enter your address"/>
            </div>

            <div class="form-group">
                <label for="phone">Phone <span style="color:#999;">(optional)</span></label>
                <input type="text" id="phone" name="phone" placeholder="Enter your phone number"/>
            </div>

            <button type="submit" class="btn-submit">Create Account</button>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>

</body>
</html>
